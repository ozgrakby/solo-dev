name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' 


concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SvelteKit
        # Buradaki BASE_PATH reponun adıdır. Repo adın "solo-dev" ise /solo-dev yazmalısın.
        run: BASE_PATH="/solo-dev" npm run build
        env:
          # Supabase projen statik olarak derleneceği için ENV değişkenlerini build anında vermeliyiz.
          # GitHub Secrets'tan okuması için şu ayarı ekliyoruz:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4